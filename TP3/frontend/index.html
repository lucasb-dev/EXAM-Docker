<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 2rem; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #status { font-weight: bold; margin-bottom: 15px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TaskFlow DevOps</h1>
        <p id="status">Vérification de la connexion à l'API...</p>
        
        <button onclick="addTask()">Créer une tâche dans Redis</button>
        
        <h3>Liste des tâches :</h3>
        <ul id="taskList"></ul>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';

        // 1. Appel de la route /health au chargement de la page
        fetch(`${API_URL}/health`)
            .then(response => response.json())
            .then(data => {
                const statusEl = document.getElementById('status');
                if(data.status === 'ok') {
                    statusEl.textContent = '🟢 API Connectée !';
                    statusEl.className = 'success';
                    loadTasks();
                }
            })
            .catch(error => {
                const statusEl = document.getElementById('status');
                statusEl.textContent = '🔴 Impossible de joindre l\'API sur le port 3001.';
                statusEl.className = 'error';
            });

        // 2. Fonction pour ajouter une tâche
        function addTask() {
            fetch(`${API_URL}/tasks`, { method: 'POST' })
                .then(() => loadTasks());
        }

        // 3. Fonction pour lire les tâches
        function loadTasks() {
            fetch(`${API_URL}/tasks`)
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('taskList');
                    list.innerHTML = '';
                    data.tasks.forEach(task => {
                        const li = document.createElement('li');
                        li.textContent = task;
                        list.appendChild(li);
                    });
                });
        }
    </script>
</body>
</html>
